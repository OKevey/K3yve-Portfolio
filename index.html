<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PORTFOLIO — DJ K3YVE</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-ring" id="cursor-ring"></div>
  <div class="scroll-line" id="scroll-line"></div>

  <!-- HEADER -->
  <header>
    <a href="#home" class="logo">KRFT<span>.</span></a>
    <nav>
      <a href="#home">Home</a>
      <a href="#about">About</a>
      <a href="#featured">Highlights</a>
      <a href="#gallery">Gallery</a>
    </nav>
  </header>

  <!-- HERO -->
  <section id="home">
    <div class="hero-bg-text">ART</div>
    <div class="grid-deco" id="grid-deco"></div>
    <div class="hero-tag">// COVER DESIGNER PORTFOLIO</div>
    <h1>DJ<br><em>K3YVE</em></h1>
    <div class="hero-line"></div>
    <p class="hero-sub" id="hero-tagline"></p>
  </section>

  <!-- PODIUM -->
  <section id="featured">
    <div class="section-label">Destaque</div>
    <h2>TOP ARTES</h2>
    <div class="podium-wrap" id="podium-wrap"></div>
  </section>

  <!-- GALLERY -->
  <section id="gallery">
    <div class="section-label">Gallery</div>
    <h2>ALL ARTS</h2>
    <div class="cat-tabs" id="cat-tabs">
      <button class="cat-tab active" data-cat="all" onclick="filterCat('all', this)">ALL</button>
    </div>
    <div class="gallery-grid" id="gallery-grid"></div>
  </section>
  
  <!-- ABOUT -->
  <section id="about">
    <div class="section-label">About</div>
    <h2>The Artist</h2>
    <p class="about-text" id="about-text"></p>
  </section>

  <!-- FOOTER -->
  <footer>
    <div class="footer-logo">KRFT.</div>
    <div class="footer-copy">// PORTFOLIO &nbsp;|&nbsp; DESIGN STUDIO &nbsp;|&nbsp; <span id="footer-year"></span></div>
  </footer>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <div class="lightbox-inner">
      <img id="lightbox-img" src="" alt="">
      <div class="lightbox-info">
        <div class="lightbox-title" id="lightbox-title"></div>
        <div class="lightbox-desc"  id="lightbox-desc"></div>
        <div class="lightbox-cat"   id="lightbox-cat"></div>
      </div>
    </div>
    <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  </div>

  <!-- arts.js DEVE vir antes de script.js -->
  <script src="arts.js"></script>
  <script src="script.js"></script>
</body>
</html>

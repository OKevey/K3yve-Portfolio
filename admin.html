<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --black:#0a0a0a;--dark:#111;--darker:#0d0d0d;
      --gray1:#1a1a1a;--gray2:#2a2a2a;--gray3:#444;--gray4:#888;
      --white:#f5f5f5;--accent:#ff3c00;--accent2:#ffcc00;--green:#00ff88;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--black);color:var(--white);font-family:'Space Mono',monospace;cursor:none;overflow-x:hidden;}
    .cursor{width:10px;height:10px;background:var(--accent);position:fixed;pointer-events:none;z-index:99999;border-radius:50%;transform:translate(-50%,-50%);will-change:left,top;}
    .cursor-ring{width:36px;height:36px;border:1.5px solid var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:99998;transform:translate(-50%,-50%);will-change:left,top;opacity:.7;}

    /* LOGIN */
    #login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a0a00 0%,var(--black) 70%);}
    .login-box{background:var(--dark);border:1px solid var(--gray2);padding:50px;width:100%;max-width:420px;text-align:center;position:relative;}
    .login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);}
    .login-logo{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;letter-spacing:.1em;color:var(--white);margin-bottom:5px;}
    .login-logo span{color:var(--accent);}
    .login-sub{font-size:.6rem;letter-spacing:.4em;color:var(--gray4);margin-bottom:40px;text-transform:uppercase;}
    .login-field{margin-bottom:20px;text-align:left;}
    .login-field label{font-size:.6rem;letter-spacing:.3em;color:var(--gray4);text-transform:uppercase;display:block;margin-bottom:8px;}
    .login-field input{width:100%;background:var(--darker);border:1px solid var(--gray2);color:var(--white);padding:12px 16px;font-family:'Space Mono',monospace;font-size:.8rem;outline:none;transition:border-color .2s;cursor:text;}
    .login-field input:focus{border-color:var(--accent);}
    .login-btn{width:100%;padding:14px;background:var(--accent);border:none;color:var(--black);font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;cursor:none;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:background .2s;margin-top:10px;}
    .login-btn:hover{background:var(--accent2);}
    .login-btn:disabled{background:var(--gray3);color:var(--gray4);}
    .login-error{font-size:.65rem;color:#ff4444;margin-top:12px;min-height:1.2em;}
    .login-warn{font-size:.6rem;color:var(--accent2);margin-top:8px;}
    .attempts-bar{display:flex;gap:4px;justify-content:center;margin-top:16px;}
    .attempt-dot{width:8px;height:8px;border-radius:50%;background:var(--gray2);border:1px solid var(--gray3);transition:background .3s;}
    .attempt-dot.used{background:#ff4444;border-color:#ff4444;}

    /* ADMIN */
    #admin-screen{display:none;}
    .admin-header{display:flex;align-items:center;justify-content:space-between;padding:25px 40px;background:var(--darker);border-bottom:2px solid var(--accent);position:sticky;top:0;z-index:10;}
    .admin-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);letter-spacing:.1em;}
    .admin-meta{font-size:.6rem;color:var(--gray4);letter-spacing:.2em;margin-top:4px;}
    .header-right{display:flex;gap:12px;align-items:center;}
    .session-timer{font-size:.6rem;color:var(--gray4);letter-spacing:.15em;}
    .btn-logout{background:none;border:1px solid var(--gray3);color:var(--gray4);padding:8px 16px;cursor:none;font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.1em;transition:all .2s;}
    .btn-logout:hover{border-color:#ff4444;color:#ff4444;}
    .admin-body{padding:40px;max-width:1000px;margin:0 auto;}
    .admin-section{background:var(--gray1);border:1px solid var(--gray2);padding:30px;margin-bottom:30px;}
    .admin-section h3{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.1em;color:var(--white);margin-bottom:25px;padding-bottom:15px;border-bottom:1px solid var(--gray2);}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:15px;}
    .form-row.full{grid-template-columns:1fr;}
    label{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.3em;color:var(--gray4);text-transform:uppercase;display:block;margin-bottom:8px;}
    input[type=text],input[type=password],textarea,select{width:100%;background:var(--dark);border:1px solid var(--gray2);color:var(--white);padding:10px 14px;font-family:'Space Mono',monospace;font-size:.75rem;outline:none;transition:border-color .2s;cursor:text;}
    input[type=text]:focus,input[type=password]:focus,textarea:focus,select:focus{border-color:var(--accent);}
    textarea{resize:vertical;min-height:80px;}
    select{cursor:none;}
    select option{background:var(--dark);}
    .upload-zone{border:2px dashed var(--gray3);padding:40px;text-align:center;cursor:none;transition:border-color .2s;background:var(--dark);position:relative;}
    .upload-zone:hover{border-color:var(--accent);}
    .upload-zone p{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--gray4);letter-spacing:.2em;pointer-events:none;}
    .upload-zone p span{color:var(--accent);}
    .upload-preview{max-width:200px;max-height:200px;object-fit:contain;display:none;margin:15px auto 0;}
    .btn-primary{font-family:'Barlow Condensed',sans-serif;font-size:.9rem;font-weight:800;letter-spacing:.2em;text-transform:uppercase;color:var(--black);background:var(--accent);border:none;padding:12px 30px;cursor:none;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%);transition:background .2s;width:100%;margin-top:10px;}
    .btn-primary:hover{background:var(--accent2);}
    .btn-primary:disabled{background:var(--gray3);color:var(--gray4);}
    .btn-secondary{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--gray4);background:none;border:1px solid var(--gray3);padding:8px 16px;cursor:none;transition:all .2s;}
    .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
    .btn-danger{font-family:'Space Mono',monospace;font-size:.65rem;color:#ff4444;background:none;border:1px solid #442222;padding:5px 10px;cursor:none;transition:all .2s;}
    .btn-danger:hover{border-color:#ff4444;}
    .admin-arts-list{display:grid;gap:10px;margin-top:10px;}
    .admin-art-row{display:grid;grid-template-columns:70px 1fr auto auto;align-items:center;gap:15px;background:var(--dark);border:1px solid var(--gray2);padding:12px;}
    .admin-art-row img{width:70px;height:70px;object-fit:cover;filter:grayscale(.5);}
    .admin-art-row-info{min-width:0;}
    .admin-art-row-name{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--white);letter-spacing:.05em;}
    .admin-art-row-meta{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--gray4);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .podium-selects{display:grid;grid-template-columns:1fr 1fr 1fr;gap:15px;margin-top:10px;}
    .podium-slot label{color:var(--accent2);}
    .categories-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
    .category-tag{background:var(--gray2);border:1px solid var(--gray3);padding:6px 14px;font-family:'Space Mono',monospace;font-size:.65rem;color:var(--gray4);display:flex;align-items:center;gap:8px;}
    .category-tag button{background:none;border:none;color:#ff4444;cursor:none;font-size:.75rem;padding:0;line-height:1;}
    .pw-error{font-family:'Space Mono',monospace;font-size:.65rem;color:#ff4444;margin-top:8px;min-height:1em;}
    .toast{position:fixed;bottom:30px;right:30px;background:var(--accent);color:var(--black);font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.15em;padding:12px 20px;z-index:99990;transform:translateY(100px);transition:transform .3s ease;pointer-events:none;}
    .toast.show{transform:translateY(0);}
    .security-badge{display:inline-flex;align-items:center;gap:6px;font-size:.6rem;color:var(--green);letter-spacing:.2em;margin-top:5px;}
    .security-badge::before{content:'●';font-size:.5rem;}
    .progress-bar{height:3px;background:var(--gray2);margin-top:10px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--accent);width:0%;transition:width .3s;}
    @media(max-width:768px){
      body{cursor:auto;}.cursor,.cursor-ring{display:none;}
      .admin-body{padding:20px;}.form-row{grid-template-columns:1fr;}
      .podium-selects{grid-template-columns:1fr;}.admin-header{padding:15px 20px;flex-direction:column;gap:10px;}
    }
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursor-ring"></div>
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">KRFT<span>.</span></div>
    <div class="login-sub">// acesso restrito</div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="login-pw" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn" id="login-btn" onclick="doLogin()">ENTRAR</button>
    <p class="login-error" id="login-error"></p>
    <p class="login-warn"  id="login-warn"></p>
    <div class="attempts-bar" id="attempts-bar">
      <div class="attempt-dot" id="dot-0"></div>
      <div class="attempt-dot" id="dot-1"></div>
      <div class="attempt-dot" id="dot-2"></div>
      <div class="attempt-dot" id="dot-3"></div>
      <div class="attempt-dot" id="dot-4"></div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin-screen">
  <div class="admin-header">
    <div>
      <div class="admin-title">⬡ PAINEL DE CONTROLE</div>
      <div class="admin-meta">// sessão segura &nbsp;|&nbsp; <span class="security-badge">SHA-256 + SUPABASE</span></div>
    </div>
    <div class="header-right">
      <span class="session-timer" id="session-timer"></span>
      <button class="btn-logout" onclick="logout()">SAIR</button>
    </div>
  </div>
  <div class="admin-body">

    <!-- TEXTOS -->
    <div class="admin-section">
      <h3>✏ TEXTOS DO PORTFÓLIO</h3>
      <div class="form-row full">
        <label>TAGLINE (HERO)</label>
        <input type="text" id="admin-tagline" placeholder="Artes que falam por si...">
      </div>
      <div class="form-row full">
        <label>DESCRIÇÃO (SOBRE)</label>
        <textarea id="admin-about" rows="5" placeholder="Texto da seção Sobre..."></textarea>
      </div>
      <button class="btn-primary" onclick="saveTexts()">SALVAR TEXTOS</button>
    </div>

    <!-- CATEGORIAS -->
    <div class="admin-section">
      <h3>🏷 CATEGORIAS</h3>
      <div class="form-row">
        <div>
          <label>NOVA CATEGORIA</label>
          <input type="text" id="new-cat-input" placeholder="ex: Artes de 2025" onkeydown="if(event.key==='Enter')addCategory()">
        </div>
        <div style="display:flex;align-items:flex-end;">
          <button class="btn-primary" onclick="addCategory()" style="margin-top:0;">ADICIONAR</button>
        </div>
      </div>
      <div class="categories-list" id="admin-cats-list"></div>
    </div>

    <!-- ADICIONAR ARTE -->
    <div class="admin-section">
      <h3>➕ ADICIONAR ARTE</h3>
      <div class="form-row">
        <div>
          <label>NOME DA ARTE</label>
          <input type="text" id="new-art-name" placeholder="Nome do projeto">
        </div>
        <div>
          <label>CATEGORIA</label>
          <select id="new-art-cat"><option value="">Selecione...</option></select>
        </div>
      </div>
      <div class="form-row full">
        <label>DESCRIÇÃO</label>
        <textarea id="new-art-desc" placeholder="Breve descrição desta arte..."></textarea>
      </div>
      <div class="form-row full">
        <label>IMAGEM</label>
        <div class="upload-zone" onclick="document.getElementById('art-file').click()">
          <p>Clique para selecionar imagem<br><span>// PNG, JPG, WEBP</span></p>
          <input type="file" id="art-file" accept="image/*" style="display:none" onchange="previewImage(this)">
          <img class="upload-preview" id="upload-preview">
          <div class="progress-bar" id="upload-progress-bar"><div class="progress-fill" id="upload-progress"></div></div>
        </div>
      </div>
      <button class="btn-primary" id="add-art-btn" onclick="addArt()">ADICIONAR ARTE</button>
    </div>

    <!-- PÓDIO -->
    <div class="admin-section">
      <h3>🏆 CONFIGURAR PÓDIO</h3>
      <div class="podium-selects">
        <div class="podium-slot"><label>🥇 1º LUGAR</label><select id="podium-1"></select></div>
        <div class="podium-slot"><label>🥈 2º LUGAR</label><select id="podium-2"></select></div>
        <div class="podium-slot"><label>🥉 3º LUGAR</label><select id="podium-3"></select></div>
      </div>
      <button class="btn-primary" onclick="savePodium()">SALVAR PÓDIO</button>
    </div>

    <!-- ALTERAR SENHA -->
    <div class="admin-section">
      <h3>🔒 ALTERAR SENHA</h3>
      <div class="form-row">
        <div><label>SENHA ATUAL</label><input type="password" id="pw-current" placeholder="••••••••"></div>
        <div><label>NOVA SENHA</label><input type="password" id="pw-new" placeholder="min. 8 caracteres"></div>
      </div>
      <div class="form-row full">
        <label>CONFIRMAR NOVA SENHA</label>
        <input type="password" id="pw-confirm" placeholder="••••••••">
      </div>
      <p class="pw-error" id="pw-error"></p>
      <button class="btn-primary" onclick="changePassword()">ALTERAR SENHA</button>
    </div>

    <!-- GERENCIAR ARTES -->
    <div class="admin-section">
      <h3>🗂 ARTES CADASTRADAS</h3>
      <div class="admin-arts-list" id="admin-arts-list"></div>
    </div>

  </div>
</div>

<script>
// =============================================
// SUPABASE CONFIG
// =============================================
const SUPABASE_URL  = 'https://cqwrecnwclqxtllrbicm.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNxd3JlY253Y2xxeHRsbHJiaWNtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MDkyODMsImV4cCI6MjA4Nzk4NTI4M30.wZvEQhc1BioSDj7nTojByaVsk6MyAy-TieDEEtQarzM';

async function sbFetch(path, opts={}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers:{ 'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`,'Content-Type':'application/json','Prefer':'return=representation',...opts.headers },
    ...opts
  });
  const text = await res.text();
  if (!res.ok) throw new Error(text);
  return text ? JSON.parse(text) : null;
}

// Upload de imagem para Supabase Storage
async function uploadImage(file) {
  const ext  = file.name.split('.').pop();
  const name = `art_${Date.now()}.${ext}`;
  const res  = await fetch(`${SUPABASE_URL}/storage/v1/object/arts/${name}`, {
    method: 'POST',
    headers:{ 'apikey':SUPABASE_ANON,'Authorization':`Bearer ${SUPABASE_ANON}`,'Content-Type':file.type },
    body: file
  });
  if (!res.ok) throw new Error(await res.text());
  return `${SUPABASE_URL}/storage/v1/object/public/arts/${name}`;
}

// =============================================
// SECURITY
// =============================================
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS   = 15 * 60 * 1000;
const SESSION_MS   = 2  * 60 * 60 * 1000;
const SEC_KEY      = 'krft_sec';

async function sha256(msg) {
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getSecState()    { try { return JSON.parse(localStorage.getItem(SEC_KEY)||'{}'); } catch{return{};} }
function setSecState(obj) { localStorage.setItem(SEC_KEY, JSON.stringify(obj)); }

function isLockedOut() {
  const s = getSecState();
  if (!s.lockUntil) return false;
  if (Date.now() < s.lockUntil) return true;
  setSecState({...s, attempts:0, lockUntil:null}); return false;
}
function recordFail() {
  const s=getSecState(), a=(s.attempts||0)+1;
  const u={...s,attempts:a};
  if(a>=MAX_ATTEMPTS) u.lockUntil=Date.now()+LOCKOUT_MS;
  setSecState(u); return a;
}
function resetAttempts() { setSecState({...getSecState(),attempts:0,lockUntil:null}); }
function getLockMins()   { const s=getSecState(); return s.lockUntil?Math.ceil((s.lockUntil-Date.now())/60000):0; }
function createSession() { setSecState({...getSecState(),sessionExpiry:Date.now()+SESSION_MS}); }
function isSessionValid(){ const s=getSecState(); return s.sessionExpiry&&Date.now()<s.sessionExpiry; }
function clearSession()  { setSecState({...getSecState(),sessionExpiry:null}); }

// =============================================
// DATA STATE (carregado do Supabase)
// =============================================
let db = { arts:[], categories:[], podium:[null,null,null], tagline:'', about:'', pwHash:null };

async function loadDB() {
  try {
    const arts = await sbFetch('arts?select=*&order=created_at.desc');
    db.arts = arts || [];
    db.categories = [...new Set(db.arts.map(a=>a.category).filter(Boolean))];

    const settings = await sbFetch('settings?select=*');
    if (settings) settings.forEach(s => {
      if(s.key==='tagline') db.tagline = s.value;
      if(s.key==='about')   db.about   = s.value;
      if(s.key==='podium')  db.podium  = JSON.parse(s.value||'[null,null,null]');
      if(s.key==='pwHash')  db.pwHash  = s.value;
    });

    // Se ainda não tem hash salvo, cria com senha padrão
    if (!db.pwHash) {
      db.pwHash = await sha256('krft2025');
      await saveSetting('pwHash', db.pwHash);
    }
  } catch(e) { console.error('Erro ao carregar DB:', e); }
}

async function saveSetting(key, value) {
  await sbFetch('settings', {
    method:'POST',
    headers:{'Prefer':'resolution=merge-duplicates'},
    body: JSON.stringify({key, value})
  });
}

// =============================================
// CURSOR
// =============================================
const cursorDot=document.getElementById('cursor'), cursorRing=document.getElementById('cursor-ring');
let mouseX=window.innerWidth/2,mouseY=window.innerHeight/2,ringX=mouseX,ringY=mouseY;
document.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;cursorDot.style.left=mouseX+'px';cursorDot.style.top=mouseY+'px';});
(function ani(){ringX+=(mouseX-ringX)*0.12;ringY+=(mouseY-ringY)*0.12;cursorRing.style.left=ringX+'px';cursorRing.style.top=ringY+'px';requestAnimationFrame(ani);})();

// =============================================
// TOAST
// =============================================
function toast(msg,ok=true){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.background=ok?'var(--accent)':'#ff4444';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800);
}

// =============================================
// LOGIN
// =============================================
function updateDots(n){ for(let i=0;i<5;i++) document.getElementById(`dot-${i}`).classList.toggle('used',i<n); }

async function doLogin() {
  const errEl=document.getElementById('login-error'), warnEl=document.getElementById('login-warn'), btn=document.getElementById('login-btn');
  errEl.textContent=''; warnEl.textContent='';
  if (isLockedOut()) { errEl.textContent=`// BLOQUEADO. Tente em ${getLockMins()} min.`; btn.disabled=true; return; }
  const pw=document.getElementById('login-pw').value;
  const hash=await sha256(pw);
  if (hash===db.pwHash) {
    resetAttempts(); createSession(); updateDots(0); showAdmin();
  } else {
    const a=recordFail(); updateDots(a);
    document.getElementById('login-pw').value='';
    if(a>=MAX_ATTEMPTS){ errEl.textContent=`// BLOQUEADO por 15 minutos.`; btn.disabled=true; }
    else { errEl.textContent='// SENHA INCORRETA.'; warnEl.textContent=`${5-a} tentativa(s) restante(s).`; }
  }
}

// =============================================
// SESSION TIMER
// =============================================
let timerInterval=null;
function startTimer(){
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(!isSessionValid()){logout();return;}
    const s=getSecState(), r=Math.max(0,s.sessionExpiry-Date.now());
    const m=Math.floor(r/60000), sec=Math.floor((r%60000)/1000);
    document.getElementById('session-timer').textContent=`// expira em ${m}:${String(sec).padStart(2,'0')}`;
  },1000);
}

// =============================================
// SHOW/HIDE
// =============================================
function showAdmin(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-screen').style.display='block';
  renderAdmin(); startTimer();
}
function logout(){
  clearSession(); clearInterval(timerInterval);
  document.getElementById('admin-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-pw').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('login-warn').textContent='';
  updateDots(getSecState().attempts||0);
}

// =============================================
// RENDER ADMIN
// =============================================
function renderAdmin(){
  document.getElementById('admin-tagline').value = db.tagline;
  document.getElementById('admin-about').value   = db.about;

  // Categories
  const cl=document.getElementById('admin-cats-list');
  cl.innerHTML=db.categories.map(c=>`<div class="category-tag">${c}<button onclick="removeCategory('${c}')">✕</button></div>`).join('')
    || '<span style="font-family:Space Mono;font-size:.65rem;color:#444;">// Nenhuma categoria</span>';

  // Cat select
  document.getElementById('new-art-cat').innerHTML=`<option value="">Selecione...</option>`
    +db.categories.map(c=>`<option value="${c}">${c}</option>`).join('');

  // Podium
  const artOpts=`<option value="">— Vazio —</option>`+db.arts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
  ['podium-1','podium-2','podium-3'].forEach((id,i)=>{
    const s=document.getElementById(id); s.innerHTML=artOpts; s.value=db.podium[i]||'';
  });

  // Arts list
  const al=document.getElementById('admin-arts-list');
  al.innerHTML=db.arts.length
    ? db.arts.map(a=>`
      <div class="admin-art-row">
        <img src="${a.img}" alt="${a.name}">
        <div class="admin-art-row-info">
          <div class="admin-art-row-name">${a.name}</div>
          <div class="admin-art-row-meta">${a.category||'Sem categoria'} // ${a.description?a.description.substring(0,50)+'...':'Sem descrição'}</div>
        </div>
        <button class="btn-secondary" onclick="editArt('${a.id}')">✏</button>
        <button class="btn-danger"    onclick="deleteArt('${a.id}')">✕</button>
      </div>`).join('')
    : '<p style="font-family:Space Mono;font-size:.65rem;color:#444;text-align:center;padding:20px;">// Nenhuma arte cadastrada</p>';

  ['pw-current','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pw-error').textContent='';
}

// =============================================
// SAVE TEXTS
// =============================================
async function saveTexts(){
  try {
    await saveSetting('tagline', document.getElementById('admin-tagline').value);
    await saveSetting('about',   document.getElementById('admin-about').value);
    db.tagline = document.getElementById('admin-tagline').value;
    db.about   = document.getElementById('admin-about').value;
    toast('// TEXTOS SALVOS');
  } catch(e){ toast('// ERRO AO SALVAR',false); }
}

// =============================================
// CATEGORIES
// =============================================
async function addCategory(){
  const input=document.getElementById('new-cat-input'), val=input.value.trim();
  if(!val) return;
  if(db.categories.includes(val)){toast('// JÁ EXISTE',false);return;}
  db.categories.push(val);
  input.value='';
  // Categorias ficam nas artes — só atualiza UI
  renderAdmin(); toast('// CATEGORIA ADICIONADA');
}
async function removeCategory(cat){
  if(!confirm(`Remover "${cat}"?`)) return;
  try {
    // Remove categoria de todas as artes com essa categoria
    await sbFetch(`arts?category=eq.${encodeURIComponent(cat)}`,{method:'PATCH',body:JSON.stringify({category:''})});
    db.categories=db.categories.filter(c=>c!==cat);
    db.arts=db.arts.map(a=>a.category===cat?{...a,category:''}:a);
    renderAdmin(); toast('// CATEGORIA REMOVIDA');
  } catch(e){ toast('// ERRO',false); }
}

// =============================================
// ARTS
// =============================================
function previewImage(input){
  const file=input.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=e=>{const p=document.getElementById('upload-preview');p.src=e.target.result;p.style.display='block';};
  r.readAsDataURL(file);
}

async function addArt(){
  const name=document.getElementById('new-art-name').value.trim();
  const cat =document.getElementById('new-art-cat').value;
  const desc=document.getElementById('new-art-desc').value.trim();
  const fi  =document.getElementById('art-file');
  if(!name)       {toast('// INSIRA O NOME',false);return;}
  if(!fi.files[0]){toast('// SELECIONE IMAGEM',false);return;}

  const btn=document.getElementById('add-art-btn');
  btn.disabled=true; btn.textContent='ENVIANDO...';
  const bar=document.getElementById('upload-progress');
  bar.style.width='30%';

  try {
    // 1. Upload da imagem para o Storage
    const imgUrl = await uploadImage(fi.files[0]);
    bar.style.width='70%';

    // 2. Salva arte no banco
    const res = await sbFetch('arts', {
      method:'POST',
      body: JSON.stringify({ id:'art_'+Date.now(), name, description:desc, category:cat, img:imgUrl })
    });
    bar.style.width='100%';

    db.arts.unshift(res[0] || {id:'art_'+Date.now(),name,description:desc,category:cat,img:imgUrl});
    if(cat && !db.categories.includes(cat)) db.categories.push(cat);

    renderAdmin();
    document.getElementById('new-art-name').value='';
    document.getElementById('new-art-desc').value='';
    document.getElementById('new-art-cat').value='';
    fi.value='';
    document.getElementById('upload-preview').style.display='none';
    toast('// ARTE ADICIONADA ✓');
  } catch(e){
    console.error(e);
    toast('// ERRO AO ENVIAR: '+e.message,false);
  }
  bar.style.width='0%';
  btn.disabled=false; btn.textContent='ADICIONAR ARTE';
}

async function deleteArt(id){
  if(!confirm('Excluir esta arte?')) return;
  try {
    await sbFetch(`arts?id=eq.${id}`,{method:'DELETE'});
    db.arts=db.arts.filter(a=>a.id!==id);
    db.podium=db.podium.map(p=>p===id?null:p);
    await saveSetting('podium',JSON.stringify(db.podium));
    renderAdmin(); toast('// ARTE REMOVIDA');
  } catch(e){ toast('// ERRO',false); }
}

async function editArt(id){
  const art=db.arts.find(a=>a.id===id); if(!art) return;
  const n=prompt('Nome:',art.name);       if(n===null) return;
  const d=prompt('Descrição:',art.description||''); if(d===null) return;
  try {
    await sbFetch(`arts?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({name:n.trim()||art.name,description:d.trim()})});
    art.name=n.trim()||art.name; art.description=d.trim();
    renderAdmin(); toast('// ATUALIZADA');
  } catch(e){ toast('// ERRO',false); }
}

// =============================================
// PODIUM
// =============================================
async function savePodium(){
  db.podium=[
    document.getElementById('podium-1').value||null,
    document.getElementById('podium-2').value||null,
    document.getElementById('podium-3').value||null
  ];
  try {
    await saveSetting('podium',JSON.stringify(db.podium));
    toast('// PÓDIO SALVO');
  } catch(e){ toast('// ERRO',false); }
}

// =============================================
// CHANGE PASSWORD
// =============================================
async function changePassword(){
  const cur=document.getElementById('pw-current').value;
  const nw =document.getElementById('pw-new').value;
  const cf =document.getElementById('pw-confirm').value;
  const el =document.getElementById('pw-error');
  el.textContent='';
  if(await sha256(cur)!==db.pwHash){el.textContent='// SENHA ATUAL INCORRETA.';return;}
  if(nw.length<8){el.textContent='// MÍNIMO 8 CARACTERES.';return;}
  if(nw!==cf){el.textContent='// SENHAS NÃO COINCIDEM.';return;}
  try {
    db.pwHash=await sha256(nw);
    await saveSetting('pwHash',db.pwHash);
    ['pw-current','pw-new','pw-confirm'].forEach(id=>document.getElementById(id).value='');
    toast('// SENHA ALTERADA ✓');
  } catch(e){ toast('// ERRO',false); }
}

// =============================================
// INIT
// =============================================
(async()=>{
  await loadDB();
  if(isSessionValid()){
    showAdmin();
  } else {
    updateDots(getSecState().attempts||0);
    if(isLockedOut()){
      document.getElementById('login-error').textContent=`// BLOQUEADO. Tente em ${getLockMins()} min.`;
      document.getElementById('login-btn').disabled=true;
    }
  }
})();
</script>
